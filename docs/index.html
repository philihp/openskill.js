<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>openskill.js — Documentation</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="description"
      content="Javascript implementation of the Weng-Lin Bayesian online skill-ranking method, with idiomatic examples in JavaScript, Python, Java, Kotlin, Elixir, Lua, and Google Apps Script."
    />
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/prismjs@1/themes/prism.css"

      :root {
        --theme-color: #42b983;
      }
      .markdown-section pre > code {
        font-size: 0.85rem;
      }
      .app-name-link img {
        max-height: 80px;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading…</div>
    <script>
      window.$docsify = {
        name: 'openskill.js',

        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        onlyCover: false,
        auto2top: true,

        subMaxLevel: 2,

          paths: 'auto',

        copyCode: {

          errorText: 'Error',
          successText: 'Copied',

        pagination: {
          previousText: 'Previous',
          nextText: 'Next',
          crossChapter: true,
          crossChapterText: true,
        },
        alias: {
          '/.*/_sidebar.md': '/_sidebar.md',
          '/.*/_navbar.md': '/_navbar.md',

      }

    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
